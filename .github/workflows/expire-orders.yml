name: Expire stale orders

# D-8b（2026-06-25・production-ization）: commerce(orders) は archive 方針ゆえ **schedule(毎5分) を除去**。
#   本線 production では /api/cron/expire-orders は proxy gate(MAINLINE_SCOPE_ONLY)で 404=no-op。
#   commerce 復活時に備え workflow_dispatch（手動）のみ残置。自動発火はしない。
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call expire endpoint
        run: |
          set -e
          URL="https://culcept.vercel.app/api/cron/expire-orders"
          echo "GET $URL"
          curl -sS -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" "$URL" | tee out.json
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('out.json','utf8')); if(!j.ok){console.error(j); process.exit(1)}"
